name: Send Faker Message

on:
  workflow_dispatch:

jobs:
  send-faker-message:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start worker in background
        run: |
          npm run dev -- --local --port 8787 > wrangler.log 2>&1 &
          echo $! > wrangler.pid

      - name: Wait for worker readiness
        run: |
          for i in {1..60}; do
            if curl -sS -o /dev/null -X OPTIONS http://127.0.0.1:8787; then
              echo "Worker is ready"
              exit 0
            fi
            sleep 1
          done
          echo "Worker failed to start"
          cat wrangler.log
          exit 1

      - name: Send faker message through worker endpoint
        env:
          WORKER_URL: http://127.0.0.1:8787
        run: npm run send:faker-message

      - name: Print worker logs
        if: always()
        run: |
          echo "===== wrangler.log ====="
          cat wrangler.log || true

      - name: Stop worker
        if: always()
        run: |
          if [ -f wrangler.pid ]; then
            kill "$(cat wrangler.pid)" || true
          fi
