name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check and tests
        run: npm run ci
